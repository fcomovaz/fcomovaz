name: Update Github README
on:
  schedule:
    # - cron: '0 20 * * *'
    - cron: '*/9 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repo
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - uses: actions/cache@v2
        name: Configure pip caching
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Python dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Create Anime File
        run: |
          python anime.py
      - name: Create Moon Phase File
        run: |
          python moon.py
      - name: Update README
        run: |-
          python joiner.py
          cat README.md
      - name: Delete Extra Files
        run: |-
          rm temp_moonphase.md
          rm temp_animes.md
      - name: Commit and push if changed
        run: |-
          git diff
          git config --global user.email "fj.morenovazquez@ugto.mx"
          git config --global user.name "fcomovaz"
          git add -A
          git commit -m "Github README: Ready!!" || exit 0
          git push
